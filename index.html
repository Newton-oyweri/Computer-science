<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

<style>
body{
  margin:0;
  height:100vh;
  background:#000;
  overflow:hidden;
  font-family:'Courier New', monospace;
}
canvas{
  position:fixed;
  inset:0;
  z-index:1;
}

/* --- Download Section --- */
.download-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 100;
  text-align: right;
}
.download-btn {
  background: #00ffaa;
  color: #000;
  padding: 10px 18px;
  border-radius: 30px;
  font-weight: bold;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.9rem;
  box-shadow: 0 0 15px rgba(0,255,170,.4);
  transition: 0.25s;
  border: none;
  font-family: system-ui, -apple-system, sans-serif;
}
.download-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 25px rgba(0,255,170,.7);
  color: #000;
}
.download-count {
  margin-top: 5px;
  font-size: 0.8rem;
  color: #00ffaa;
  font-family: 'Courier New', monospace;
  letter-spacing: 1px;
}

.intro-box{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  text-align:center;
  pointer-events:none;
  opacity:0;
}
h1{
  margin:0;
  font-size:clamp(5rem,12vw,9rem);
  letter-spacing:0.08em;
  color: white;
}
.subtitle{
  margin-top:0.8rem;
  font-size:clamp(1.4rem,4vw,2.2rem);
  color:#00cc88;
  opacity:0.9;
  letter-spacing:0.15em;
}
.tap-note{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  color:#00ffaa;
  font-size:0.9rem;
  opacity:0;
  transition:opacity 1s;
}
</style>
</head>
<body>

<div class="download-container">
  <a href="#" class="download-btn" onclick="trackDownload()">
    <i class="bi bi-download"></i>
    Download APK
  </a>
  <div id="downloads" class="download-count">
    Loading...
  </div>
</div>

<div class="intro-box" id="intro">
<h1>COMPUTER SCIENCE</h1>
<div class="subtitle">smart ecosystem</div>
</div>

<div id="tapText" class="tap-note">Tap anywhere</div>

<canvas id="c"></canvas>
<script src="script.js"></script>
</body>
</html>
